<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="glass rounded-2xl shadow-2xl p-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent mb-4">
                🤖 AI Daily Report
            </h1>
            <p class="text-xl text-gray-600 mb-6">每天更新AI科技新闻日报</p>
            <div class="text-center py-12 text-gray-500">
                <p class="text-6xl mb-4">🚀</p>
                <p>日报即将上线...</p>
                <p class="text-sm text-gray-400 mt-4">每天8点自动更新</p>
            </div>
            <p class="text-gray-500 mt-8">
                🦞 由林的助手自动生成
            </p>
        </div>
    </div>
</body>
</html>
