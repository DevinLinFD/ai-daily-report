<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto" id="app">
        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white"></div>
            <p class="text-white text-xl mt-6 loading">正在加载日报...</p>
        </div>

        <!-- Content -->
        <div id="content" class="hidden">
            <!-- Header -->
            <div class="glass rounded-2xl shadow-2xl p-8 mb-8 text-center">
                <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent mb-4">
                    🤖 <span id="site-name"></span>
                </h1>
                <p class="text-xl text-gray-600 mb-2" id="site-description"></p>
                <p class="text-gray-500">📅 <span id="generated-date"></span></p>
                <div class="mt-4 inline-block bg-gradient-to-r from-purple-500 to-blue-500 text-white px-6 py-2 rounded-full text-lg font-semibold">
                    📊 今日共 <span id="total-news"></span> 条新闻
                </div>
                <p class="text-sm text-gray-400 mt-3">更新时间: <span id="generated-time"></span></p>
            </div>

            <!-- Summary Stats -->
            <div id="stats-container" class="glass rounded-2xl shadow-2xl p-6 mb-8">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="mr-2">📈</span>
                    今日概览
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="stats-grid">
                    <!-- Stats will be rendered here -->
                </div>
            </div>

            <!-- Categories -->
            <div id="categories-container" class="glass rounded-2xl shadow-2xl p-8">
                <!-- Categories will be rendered here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="glass rounded-2xl shadow-2xl p-12 text-center hidden">
                <p class="text-6xl mb-4">😴</p>
                <p class="text-xl text-gray-600">今天暂无新闻</p>
                <p class="text-gray-500 mt-2">明天再来看看吧~</p>
            </div>

            <!-- Footer -->
            <div class="glass rounded-2xl shadow-2xl p-6 mt-8 text-center">
                <p class="text-gray-600">
                    🦞 由 <strong>林的助手</strong> 自动生成
                </p>
                <p class="text-sm text-gray-500 mt-2">
                    数据来源: Tavily API | 翻译: Google Translate
                </p>
                <p class="text-sm text-gray-400 mt-1">
                    基于 GitHub Actions + GitHub Pages 自动部署
                </p>
                <div class="mt-4 space-x-4">
                    <a id="site-url" href="#" class="inline-block text-purple-600 hover:text-purple-800">
                        🏠 访问网站
                    </a>
                    <a id="repo-url" href="#" target="_blank" class="inline-block text-gray-600 hover:text-gray-800">
                        💻 查看代码
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                render(data);
            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="glass rounded-2xl shadow-2xl p-12 text-center">
                        <p class="text-6xl mb-4">❌</p>
                        <p class="text-xl text-gray-600">加载失败</p>
                        <p class="text-gray-500 mt-2">无法获取日报数据</p>
                        <p class="text-sm text-gray-400 mt-4">${error.message}</p>
                    </div>
                `;
            }
        }

        function render(data) {
            // Hide loading, show content
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');

            const metadata = data.metadata;
            const categories = data.categories;

            // Set metadata
            document.getElementById('site-name').textContent = metadata.site_name;
            document.getElementById('site-description').textContent = metadata.site_description;
            document.getElementById('generated-date').textContent = metadata.generated_date;
            document.getElementById('total-news').textContent = metadata.total_news;
            document.getElementById('generated-time').textContent = metadata.generated_time;
            document.getElementById('site-url').href = metadata.site_url;
            document.getElementById('repo-url').href = `https://github.com/DevinLinFD/ai-daily-report`;

            // Render stats
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = Object.entries(categories).map(([cat, news]) => `
                <div class="text-center p-4 bg-gradient-to-br from-purple-50 to-blue-50 rounded-xl">
                    <p class="text-3xl font-bold text-purple-600">${news.length}</p>
                    <p class="text-sm text-gray-600">${cat}</p>
                </div>
            `).join('');

            // Render categories
            const categoriesContainer = document.getElementById('categories-container');

            if (Object.keys(categories).length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            categoriesContainer.innerHTML = Object.entries(categories).map(([category, newsList]) => `
                <div class="mb-8">
                    <div class="flex items-center mb-4">
                        <span class="text-2xl mr-3">📁</span>
                        <h2 class="text-2xl font-bold text-gray-800">${category}</h2>
                        <span class="ml-3 bg-purple-100 text-purple-800 text-sm px-3 py-1 rounded-full">
                            ${newsList.length} 条
                        </span>
                    </div>
                    <div class="space-y-3">
                        ${newsList.map(news => `
                            <div class="bg-white rounded-lg p-4 border border-gray-200 hover:shadow-md transition-shadow">
                                <h3 class="font-semibold text-gray-800 mb-2 flex items-start">
                                    <span class="text-blue-500 mr-2">📌</span>
                                    <span>${escapeHtml(news.title)}</span>
                                </h3>
                                <p class="text-gray-600 text-sm mb-3 leading-relaxed">${escapeHtml(news.content)}</p>
                                <a href="${news.url}" target="_blank" class="inline-flex items-center text-purple-600 hover:text-purple-800 text-sm">
                                    <span>阅读原文</span>
                                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                    </svg>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
