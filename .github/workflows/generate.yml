name: AI Daily Report Generator

on:
  # 定时任务：每天早上8点（UTC+8）运行
  # GitHub Actions cron使用UTC时间，所以8:00 CST = 00:00 UTC
  schedule:
    - cron: '0 0 * * *'

  # 允许手动触发
  workflow_dispatch:

  # 推送到main分支时也触发（可选）
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 设置权限，允许提交代码
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate AI Daily Report
      run: |
        python generate.py

    - name: Commit and push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add index.html data.json
        git diff --staged --quiet || git commit -m "📰 Update AI Daily Report - $(date +'%Y-%m-%d %H:%M:%S')"
        git push
